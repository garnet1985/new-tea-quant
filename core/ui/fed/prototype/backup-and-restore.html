<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTQ Prototype - 高级功能</title>
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./components.css" />
  <link rel="stylesheet" href="./backtest.css" />
  <link rel="stylesheet" href="./workbench.css" />
</head>
<body>
  <div class="layout">
    <header class="top-nav">
      <div class="brand-wrap">
        <p class="brand">NTQ Console</p>
        <p class="brand-sub">Public Users Prototype v1</p>
      </div>
      <nav class="nav">
        <a href="./workbench.html">策略工作台</a>
        <a href="./scan.html">机会扫描</a>
        <div class="nav-dropdown is-active">
          <button type="button" class="nav-parent" aria-haspopup="true" aria-expanded="true">高级功能 ▾</button>
          <div class="nav-dropdown-menu">
            <a href="./data-acquire.html">数据接入</a>
            <a href="./tag-console.html">标签工作台/配置</a>
            <a href="./backup-and-restore.html">备份与恢复</a>
          </div>
        </div>
        <a href="./settings.html">设置</a>
      </nav>
    </header>

    <main class="content workbench-detail-wide advanced-page">
      <header class="topbar">
        <div>
          <h1 class="title">高级功能</h1>
          <p class="subtitle">当前优先实现：备份与恢复。通过统一流程管理全量/单表备份与版本恢复。</p>
        </div>
        <span class="status status-idle" id="backup-global-status">就绪</span>
      </header>

      <section id="backup-restore">
        <div class="card">
          <div class="section-head">
            <h3>备份与恢复</h3>
            <span class="muted" id="backup-active-tab-label">当前：备份</span>
          </div>

          <div class="advanced-tabbar">
            <button type="button" class="advanced-tab is-active" data-tab="backup">备份</button>
            <button type="button" class="advanced-tab" data-tab="restore">恢复</button>
          </div>
        </div>

        <div class="card advanced-tab-panel" id="panel-backup">
          <div class="section-head">
            <h3>备份 Block</h3>
          </div>
          <div class="advanced-mode-row">
            <label class="advanced-radio">
              <input type="radio" name="backup-mode" value="full" checked />
              <span>整体备份</span>
            </label>
            <label class="advanced-radio">
              <input type="radio" name="backup-mode" value="table" />
              <span>单表备份</span>
            </label>
          </div>

          <div class="advanced-form-grid" id="backup-table-row" hidden>
            <label>
              选择数据表
              <select id="backup-table-select">
                <option value="stock_kline_daily">stock_kline_daily</option>
                <option value="stock_basic_info">stock_basic_info</option>
                <option value="strategy_runs">strategy_runs</option>
                <option value="tags_snapshot">tags_snapshot</option>
              </select>
            </label>
          </div>

          <div class="scan-progress-panel advanced-progress-wrap" id="backup-progress-wrap" hidden>
            <div class="scan-progress-track">
              <div class="scan-progress-bar" id="backup-progress-bar"></div>
            </div>
            <p class="muted scan-progress-label" id="backup-progress-label">准备中…</p>
          </div>

          <div class="advanced-actions">
            <button type="button" class="button" id="btn-start-backup">开始备份</button>
          </div>
          <p class="muted advanced-result" id="backup-result-text">尚未发起备份。</p>
        </div>

        <div class="card advanced-tab-panel" id="panel-restore" hidden>
          <div class="section-head">
            <h3>恢复 Block</h3>
          </div>
          <div class="advanced-form-grid">
            <label>
              备份版本（userspace/backup 下按时间命名）
              <select id="restore-version-select">
                <option value="2026-04-23_02-15-09">2026-04-23_02-15-09</option>
                <option value="2026-04-22_23-40-18">2026-04-22_23-40-18</option>
                <option value="2026-04-21_11-02-56">2026-04-21_11-02-56</option>
              </select>
            </label>
          </div>

          <div class="scan-progress-panel advanced-progress-wrap" id="restore-progress-wrap" hidden>
            <div class="scan-progress-track">
              <div class="scan-progress-bar" id="restore-progress-bar"></div>
            </div>
            <p class="muted scan-progress-label" id="restore-progress-label">准备中…</p>
          </div>

          <div class="advanced-actions">
            <button type="button" class="button" id="btn-start-restore">开始恢复</button>
          </div>
          <p class="muted advanced-result" id="restore-result-text">请选择备份版本后发起恢复。</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const tabs = Array.from(document.querySelectorAll(".advanced-tab"));
      const panelBackup = document.getElementById("panel-backup");
      const panelRestore = document.getElementById("panel-restore");
      const activeLabel = document.getElementById("backup-active-tab-label");
      const globalStatus = document.getElementById("backup-global-status");

      const backupModeInputs = Array.from(document.querySelectorAll('input[name="backup-mode"]'));
      const backupTableRow = document.getElementById("backup-table-row");
      const backupTableSelect = document.getElementById("backup-table-select");
      const backupProgressWrap = document.getElementById("backup-progress-wrap");
      const backupProgressBar = document.getElementById("backup-progress-bar");
      const backupProgressLabel = document.getElementById("backup-progress-label");
      const backupResultText = document.getElementById("backup-result-text");

      const restoreVersionSelect = document.getElementById("restore-version-select");
      const restoreProgressWrap = document.getElementById("restore-progress-wrap");
      const restoreProgressBar = document.getElementById("restore-progress-bar");
      const restoreProgressLabel = document.getElementById("restore-progress-label");
      const restoreResultText = document.getElementById("restore-result-text");

      function setGlobalBusy(on, text) {
        globalStatus.className = on ? "status warn" : "status status-idle";
        globalStatus.textContent = on ? text : "就绪";
      }

      function switchTab(target) {
        tabs.forEach((btn) => {
          btn.classList.toggle("is-active", btn.dataset.tab === target);
        });
        panelBackup.hidden = target !== "backup";
        panelRestore.hidden = target !== "restore";
        activeLabel.textContent = target === "backup" ? "当前：备份" : "当前：恢复";
      }

      function runProgress(progressBar, progressLabel, progressWrap, onDone, labelText) {
        progressWrap.hidden = false;
        progressBar.style.width = "0%";
        progressLabel.textContent = `${labelText} 0%`;
        let p = 0;
        const timer = window.setInterval(() => {
          p = Math.min(100, p + Math.floor(Math.random() * 14 + 9));
          progressBar.style.width = `${p}%`;
          progressLabel.textContent = `${labelText} ${p}%`;
          if (p >= 100) {
            window.clearInterval(timer);
            onDone();
          }
        }, 260);
      }

      function refreshBackupModeUI() {
        const mode = backupModeInputs.find((i) => i.checked)?.value || "full";
        backupTableRow.hidden = mode !== "table";
      }

      tabs.forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });

      backupModeInputs.forEach((input) => {
        input.addEventListener("change", refreshBackupModeUI);
      });

      document.getElementById("btn-start-backup").addEventListener("click", () => {
        const mode = backupModeInputs.find((i) => i.checked)?.value || "full";
        const table = backupTableSelect.value;
        setGlobalBusy(true, "备份中");
        runProgress(
          backupProgressBar,
          backupProgressLabel,
          backupProgressWrap,
          () => {
            setGlobalBusy(false, "");
            const version = new Date().toLocaleString("sv-SE", { hour12: false })
              .replace(" ", "_")
              .replaceAll(":", "-");
            backupResultText.textContent =
              mode === "full"
                ? `备份完成：已生成整体备份版本 ${version}（占位）。`
                : `备份完成：表 ${table} 已生成备份版本 ${version}（占位）。`;
          },
          mode === "full" ? "整体备份中" : `备份表 ${table} 中`
        );
      });

      document.getElementById("btn-start-restore").addEventListener("click", () => {
        const version = restoreVersionSelect.value;
        setGlobalBusy(true, "恢复中");
        runProgress(
          restoreProgressBar,
          restoreProgressLabel,
          restoreProgressWrap,
          () => {
            setGlobalBusy(false, "");
            restoreResultText.textContent = `恢复完成：已从版本 ${version} 执行恢复（占位）。`;
          },
          `恢复 ${version} 中`
        );
      });

      refreshBackupModeUI();
      switchTab("backup");
    })();
  </script>
</body>
</html>
