<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTQ Prototype - 设置</title>
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./components.css" />
  <link rel="stylesheet" href="./backtest.css" />
  <link rel="stylesheet" href="./workbench.css" />
</head>
<body>
  <div class="layout">
    <header class="top-nav">
      <div class="brand-wrap">
        <p class="brand">NTQ Console</p>
        <p class="brand-sub">Public Users Prototype v1</p>
      </div>
      <nav class="nav">
        <a href="./workbench.html">策略工作台</a>
        <a href="./scan.html">机会扫描</a>
        <div class="nav-dropdown">
          <button type="button" class="nav-parent" aria-haspopup="true" aria-expanded="false">高级功能 ▾</button>
          <div class="nav-dropdown-menu">
            <a href="./data-acquire.html">数据接入</a>
            <a href="./tag-console.html">标签工作台</a>
            <a href="./backup-and-restore.html">备份与恢复</a>
          </div>
        </div>
        <a class="active" href="./settings.html">设置</a>
      </nav>
    </header>
    <main class="content workbench-detail-wide settings-page">
      <header class="topbar">
        <div>
          <h1 class="title">设置</h1>
          <p class="subtitle">设置页按 section 组织；当前先开放数据库配置。</p>
        </div>
      </header>

      <section class="card settings-sections-card">
        <div class="section-head">
          <h3>Settings Sections</h3>
        </div>
        <div class="settings-sections-row">
          <span class="settings-section-chip settings-section-chip-active">数据库配置</span>
          <span class="settings-section-chip">运行偏好（预留）</span>
          <span class="settings-section-chip">系统参数（预留）</span>
        </div>
      </section>

      <section class="card settings-db-card">
        <div class="section-head">
          <h3>DB Config</h3>
          <span class="muted">Section 1 / 已启用</span>
        </div>
        <div class="settings-db-grid">
          <label>
            数据库类型
            <select id="db-type">
              <option value="postgresql">PostgreSQL</option>
              <option value="mysql">MySQL</option>
            </select>
          </label>
          <label>
            Host
            <input id="db-host" type="text" value="127.0.0.1" />
          </label>
          <label>
            Port
            <input id="db-port" type="number" value="5432" />
          </label>
          <label>
            Database
            <input id="db-name" type="text" value="new_tea_quant" />
          </label>
          <label>
            User
            <input id="db-user" type="text" value="postgres" />
          </label>
          <label>
            Password
            <input id="db-password" type="password" placeholder="输入数据库密码" />
          </label>
        </div>
        <div class="settings-db-actions">
          <button class="button ghost-btn" type="button" id="btn-test-db">测试连接</button>
          <button class="button" type="button" id="btn-save-db">保存配置</button>
        </div>
        <p class="muted settings-db-result" id="db-result-text">当前为原型占位；后续接入 BFF API 读写 userspace 配置。</p>
      </section>

      <section class="card settings-placeholder-card">
        <h3>后续 Section（暂未开放）</h3>
        <p class="muted">后续若需要，可在此增加运行偏好、系统参数等 section。当前版本仅暴露 DB Config。</p>
      </section>
    </main>
  </div>
  <script>
    (() => {
      const result = document.getElementById("db-result-text");
      const btnTest = document.getElementById("btn-test-db");
      const btnSave = document.getElementById("btn-save-db");

      btnTest.addEventListener("click", () => {
        result.textContent = "连接测试（占位）已触发：后续将调用 /api/settings/database/test。";
      });

      btnSave.addEventListener("click", () => {
        result.textContent = "配置保存（占位）已触发：后续将调用 /api/settings/database。";
      });
    })();
  </script>
</body>
</html>
