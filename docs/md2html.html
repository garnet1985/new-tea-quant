<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown → HTML</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #1a1a2e; color: #e4e4e7; min-height: 100vh; }
    h1 { font-size: 1.25rem; margin: 0 0 12px; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1200px; align-items: flex-start; }
    @media (max-width: 768px) { .wrap { grid-template-columns: 1fr; } }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #a1a1aa; }
    textarea { width: 100%; height: 360px; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: #252536; color: #e4e4e7; font-size: 13px; line-height: 1.5; resize: vertical; }
    textarea:focus { outline: none; border-color: rgba(34, 211, 238, 0.5); }
    .actions { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
    button { padding: 8px 14px; border-radius: 8px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; }
    .btn-convert { background: linear-gradient(135deg, #a855f7, #22d3ee); color: #fff; }
    .btn-convert:hover { opacity: 0.95; }
    .btn-copy { background: rgba(255,255,255,0.1); color: #e4e4e7; }
    .btn-copy:hover { background: rgba(255,255,255,0.18); }
    .btn-copy.copied { background: rgba(34, 197, 94, 0.3); color: #86efac; }
    .tip { font-size: 12px; color: #71717a; }

    .preview {
      width: 100%;
      min-height: 600px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #111827;
      color: #e4e4e7;
      font-size: 14px;
      line-height: 1.7;
      overflow: auto;
    }

    /* 预览中 shape-* 结构的简单样式，模拟文档里的效果 */
    .preview .shape-diagram {
      margin: 16px 0 0;
      padding: 16px 20px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
    }

    .preview .diagram-extract {
      margin: 16px 0 0;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.4);
      background: rgba(15, 23, 42, 0.95);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .preview .diagram-static {
      margin: 16px 0 0;
      overflow: auto;
    }
    /* 流程图画布：带背景、带画布 border；流式布局，由内容撑开 */
    .diagram-canvas {
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.3);
      padding: 1rem;
      min-height: 120px;
    }
    .shape-arrow {
      position: absolute;
      left: 2rem;
      top: 100%; /* 从 box 底部开始往下画线 */
      pointer-events: none;
    }
    .shape-arrow-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      height: calc(100% - 10px);
    }
    .shape-arrow-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 2px;
      position: absolute;
      left: 1rem;
      top: 50%;
      min-width: 300px;
      transform: translateY(-6px);
    }

    .shape-arrow-head {
      width: 0;
      height: 0;
      position: absolute;
    }
    /* 方向：向下 */
    .shape-arrow--down .shape-arrow-line {
      width: 1px;
      background-color: #94a3b8;
    }
    .shape-arrow--down .shape-arrow-head {
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 10px solid #94a3b8;
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
    }

    .preview .shape-box {
      border: 1px solid rgba(148, 163, 184, 0.9);
      border-radius: 6px;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.9);
      max-width: 600px;
      position: relative;
      font-size: 12px;
      margin: 1rem 0;
      transition: border-color 0.3s ease;

      &.shape-box--has-attach {
        margin-bottom: 1rem;
      }
    }

    .shape-box .shape-box:hover {
      border-color: rgba(255, 255, 255, 0.9);
    }

    .shape-box.shape-layer--no-attach .shape-arrow{
      left: 50%;
      transform: translateX(-50%);
    }


    .preview .shape-row {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
    }

    .preview .shape-row .shape-box {
      flex: 1 1 0;
      min-width: 0;
    }

    .preview .shape-connector {
      min-height: 2rem;
      margin: 1rem 0;
      padding-left: 2rem;
    }

    .preview .shape-line {
      font-family: "LXGW WenKai Mono", "Sarasa Term SC", "Sarasa Gothic", Consolas, Monaco, Menlo, "DejaVu Sans Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .preview .shape-line + .shape-line {
      margin-top: 2px;
    }

    .preview .shape-line--li {
      /* 现在用字符本身作为 bullet，仅保留一点左 padding 让文本不太挤 */
      padding-left: 0.2em;
      position: relative;
    }

    .preview .shape-line--center {
      text-align: center;
      font-weight: bold;
      color: #e5e7eb; /* 适配深色主题的标题色 */
      margin-bottom: 0.5rem;
    }

    .preview .shape-heading {
      font-weight: 600;
      margin: 4px 0 6px;
    }

    .preview .shape-tree {
      margin: 8px 0 0;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-family: "LXGW WenKai Mono", "Sarasa Term SC", "Sarasa Gothic", Consolas, Monaco, Menlo, "DejaVu Sans Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre;
    }
  </style>
</head>
<body>
  <h1>Markdown → HTML（贴到 CKEditor 用）</h1>
  <div class="wrap">
    <div>
      <label for="md">Markdown 原文</label>
      <textarea id="md" placeholder="粘贴 .md 内容…"></textarea>
      <div class="actions">
        <button type="button" class="btn-convert" id="convert">转换为 HTML</button>
      </div>
    </div>
    <div>
      <label for="html">生成的 HTML</label>
      <textarea id="html" placeholder="转换后的 HTML，可复制到 CKEditor 源码" readonly></textarea>
      <div class="actions">
        <button type="button" class="btn-copy" id="copy">复制 HTML</button>
        <span class="tip">复制后到 Drupal 节点正文里用「源码」粘贴。</span>
      </div>
    </div>
  </div>

  <div style="max-width: 1200px; margin-top: 16px;">
    <label>预览（渲染后的 HTML）</label>
    <div id="preview" class="preview field--name-field-doc-content"></div>
    <div class="tip">此处仅预览，不会出现在复制的 HTML 中。</div>
  </div>

  <script>
    marked.setOptions({ gfm: true, breaks: true });
    var mdEl = document.getElementById('md');
    var htmlEl = document.getElementById('html');
    var previewEl = document.getElementById('preview');
    var convertBtn = document.getElementById('convert');
    var copyBtn = document.getElementById('copy');

    var BOX_CHARS = /[\u2500-\u257F\u2580-\u259F]/;  // 框线字符范围

    function escapeHtml(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 用 div 画框图：外层 doc-diagram，行 doc-diagram__row，格 doc-diagram__cell，用 CSS border 画线不偏差
    function buildDocDiagramDiv(rows, maxCols, firstRowIsHeader) {
      var out = '<div class="doc-diagram">';
      rows.forEach(function (cells, i) {
        out += '<div class="doc-diagram__row">';
        for (var j = 0; j < maxCols; j++) {
          var isHead = firstRowIsHeader && i === 0 && rows.length > 1;
          out += '<div class="doc-diagram__cell' + (isHead ? ' doc-diagram__cell--head' : '') + '">';
          out += escapeHtml(cells[j] || '');
          out += '</div>';
        }
        out += '</div>';
      });
      out += '</div>';
      return out;
    }

    // 把 Markdown 生成的 <table> 转成 <div class="doc-diagram"> 结构（用 border 画框）
    function tablesToDocDiagramDiv(html) {
      return html.replace(/<table(\s[^>]*)?>([\s\S]*?)<\/table>/gi, function (_, attrs, body) {
        var rows = [];
        var maxCols = 0;
        (body || '').replace(/<tr[^>]*>([\s\S]*?)<\/tr>/gi, function (__, trBody) {
          var cells = [];
          trBody.replace(/<t[hd]([^>]*)>([\s\S]*?)<\/t[hd]>/gi, function (___, cellAttrs, cellContent) {
            cells.push(cellContent.replace(/<[^>]+>/g, '').trim());
          });
          if (cells.length) {
            rows.push(cells);
            if (cells.length > maxCols) maxCols = cells.length;
          }
        });
        if (rows.length === 0) return '<table' + (attrs || '') + '>' + body + '</table>';
        var out = '<div class="doc-diagram">';
        rows.forEach(function (cells, i) {
          out += '<div class="doc-diagram__row">';
          for (var j = 0; j < maxCols; j++) {
            var isHead = i === 0 && rows.length > 1;
            out += '<div class="doc-diagram__cell' + (isHead ? ' doc-diagram__cell--head' : '') + '">' + (cells[j] || '') + '</div>';
          }
          out += '</div>';
        });
        out += '</div>';
        return out;
      });
    }

    var U_UL = '\u250C', U_UR = '\u2510', U_LL = '\u2514', U_LR = '\u2518', U_V = '\u2502'; // ┌ ┐ └ ┘ │

    // 将 ASCII 框图代码块转成基于规范的 shape-* 结构
    function asciiBlockToPreWithBoxDivs(html) {
      var diagramCounter = 0;
      return html.replace(/<pre><code[^>]*>([\s\S]*?)<\/code><\/pre>/gi, function (_, code) {
        var text = (code || '').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
        if (!BOX_CHARS.test(text)) return '<pre><code>' + code + '</code></pre>';

        var lines = text.split(/\r?\n/);

        // 1) 扫描所有候选 box（尽量宽松：顶边 ┌…┐，底边有对应 └…┘，左右列大致对齐即可）
        var boxes = [];
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          for (var col = 0; col < line.length; col++) {
            if (line.charAt(col) !== U_UL) continue; // 不是 ┌
            var rightColTop = line.indexOf(U_UR, col + 1); // 顶边的 ┐
            if (rightColTop === -1) continue;
            // 顶边中间只能是 ─ 或空格
            var okTop = true;
            for (var x = col + 1; x < rightColTop; x++) {
              var chTop = line.charAt(x);
              if (chTop !== '\u2500' && chTop !== ' ') { okTop = false; break; } // ─
            }
            if (!okTop) continue;

            // 往下找对应的 └ …… ┘（仅 └ 作为底边，├ 不作为底边，这样外框能包住内层 box）
            var bottom = -1;
            var rightCol = rightColTop;
            for (var j = i + 1; j < lines.length; j++) {
              var ln = lines[j];
              if (ln.charAt(col) === U_LL) { // 左侧同一列 └
                var rBottom = ln.lastIndexOf(U_LR);
                if (rBottom > col) {
                  bottom = j;
                  rightCol = Math.min(rightColTop, rBottom);
                  break;
                }
              }
            }
            if (bottom === -1) continue;

            boxes.push({ top: i, bottom: bottom, left: col, right: rightCol });
          }
        }

        // Debug：在控制台输出当前代码块中识别到的 box 及其内容
        if (typeof console !== 'undefined' && boxes.length) {
          try {
            console.groupCollapsed && console.groupCollapsed('%c[md2html] ASCII block', 'color:#22d3ee');
            console.log('raw lines:', lines);
            var debugBoxes = boxes.map(function (b) {
              var content = [];
              for (var yy = b.top + 1; yy < b.bottom; yy++) {
                var ln = lines[yy] || '';
                var sliceEnd = Math.min(b.right, ln.length);
                var inner = '';
                if (sliceEnd > b.left + 1) {
                  inner = ln.substring(b.left + 1, sliceEnd);
                }
                // 先去掉行尾所有边框竖线（│），再做左右空白 trim
                inner = inner.replace(/\u2502+[\s\u00A0]*$/g, '');
                inner = inner.replace(/\s+$/g, '').replace(/^\s+/g, '');
                if (inner) content.push(inner);
              }
              return {
                top: b.top,
                bottom: b.bottom,
                left: b.left,
                right: b.right,
                content: content
              };
            });
            console.log('detected boxes:', debugBoxes);
            console.groupEnd && console.groupEnd();
          } catch (e) {
            // 调试输出失败时静默忽略
          }
        }

        if (boxes.length === 0) {
          return '<pre><code>' + code + '</code></pre>';
        }

        // 2) 建立父子关系（允许多层嵌套，遇到复杂重叠最多是解析得“丑”，但不整体放弃）
        function area(b) { return (b.bottom - b.top) * (b.right - b.left); }
        function containsBox(a, b) {
          return a.top < b.top && a.bottom > b.bottom && a.left < b.left && a.right > b.right;
        }

        boxes.forEach(function (b) { b.parent = null; b.children = []; });

        for (var aIdx = 0; aIdx < boxes.length; aIdx++) {
          for (var bIdx = 0; bIdx < boxes.length; bIdx++) {
            if (aIdx === bIdx) continue;
            var A = boxes[aIdx], B = boxes[bIdx];
            if (containsBox(A, B)) {
              if (!B.parent || area(A) < area(B.parent)) {
                B.parent = A;
              }
            }
          }
        }

        // children 列表（允许多层嵌套）
        boxes.forEach(function (b) {
          if (b.parent) b.parent.children.push(b);
        });

        // 为每个 box 分配 id（抽取用）
        boxes.forEach(function (b, i) { b.id = 'n' + (i + 1); });

        // #region agent log
        try {
          var _log = { location: 'md2html.html:box-detection', message: 'boxes and parent', data: { boxCount: boxes.length, boxes: boxes.map(function (b) { return { id: b.id, top: b.top, bottom: b.bottom, left: b.left, right: b.right, parentId: b.parent ? b.parent.id : null }; }), rootCount: boxes.filter(function (b) { return !b.parent; }).length }, timestamp: Date.now(), hypothesisId: 'H1-H2' };
          fetch('http://127.0.0.1:7242/ingest/20a02fa4-ddc6-4ba9-aec5-a523284ee76c', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(_log) }).catch(function () {});
        } catch (e) {}
        // #endregion

        // 3) 标记每一行是否在任意 box 内
        var lineInBox = new Array(lines.length);
        for (var li = 0; li < lines.length; li++) lineInBox[li] = false;
        boxes.forEach(function (b) {
          for (var y = b.top; y <= b.bottom; y++) {
            lineInBox[y] = true;
          }
        });

        // 方便按行快速找到“以该行作为 top 的子 box”
        var boxTopMap = {};
        boxes.forEach(function (b) {
          boxTopMap[b.top] = boxTopMap[b.top] || [];
          boxTopMap[b.top].push(b);
        });

        // 4) 识别 heading / tree 段（只看不在 box 内的行）
        var segments = []; // { type: 'heading'|'tree'|'box', ... }
        var treeBuf = null;

        function flushTreeBuf() {
          if (treeBuf && treeBuf.length) {
            segments.push({ type: 'tree', lines: treeBuf });
            treeBuf = null;
          }
        }

        var rootBoxes = boxes.filter(function (b) { return !b.parent; });

        for (var idx = 0; idx < lines.length; idx++) {
          // 先处理以该行为 top 的根 box
          var bList = boxTopMap[idx] || [];
          var rootHere = bList.filter(function (b) { return !b.parent; });
          if (rootHere.length) {
            flushTreeBuf();
            rootHere.sort(function (a, b) { return a.left - b.left; });
            rootHere.forEach(function (b) {
              segments.push({ type: 'box', box: b });
            });
            continue;
          }

          if (lineInBox[idx]) {
            continue; // box 内部行由 box 渲染
          }

          var raw = lines[idx];
          var trimmed = raw.trim();
          if (!trimmed) {
            flushTreeBuf();
            continue;
          }

          // 顶层箭头行：不在 box 内且整行仅 ▼（可有空格），单独成段，用于大 box 之间的箭头
          if (/^\s*\u25BC\s*$/.test(trimmed)) {
            flushTreeBuf();
            segments.push({ type: 'arrow', row: idx, col: raw.indexOf('\u25BC') });
            continue;
          }

          // 是否为 tree 行：包含 │ / ├ / └ / ▼ 等，但不含 box 角
          var hasTreeChar = /[\u2502\u251C\u2524\u2514\u252C\u2534\u25BC]/.test(raw);
          var hasBoxCorner = /[\u250C\u2510\u2514\u2518]/.test(raw);
          if (hasTreeChar && !hasBoxCorner) {
            if (!treeBuf) treeBuf = [];
            treeBuf.push(raw);
            continue;
          }

          // 否则视为一个 heading 行
          flushTreeBuf();
          segments.push({ type: 'heading', text: trimmed });
        }
        flushTreeBuf();

        // 抽取模型中对齐规则：见 diagram_extraction_model.md。根据行内左右空隙判居中/居左
        function getAlign(inner) {
          if (!inner || !inner.length) return 'left';
          var s = inner.length, e = -1;
          for (var i = 0; i < inner.length; i++) {
            if (/\S/.test(inner[i])) { if (s > i) s = i; e = i; }
          }
          if (e < s) return 'left';
          var W = inner.length;
          var leftGap = s, rightGap = W - 1 - e;
          return Math.abs(leftGap - rightGap) <= 2 ? 'center' : 'left';
        }

        // 路径校验：fromBox.bottom 到 toBox.top 的箭头列上只能有 空格/边框/▼，否则不得结构化
        function pathClear(fromBox, toBox, arrowCol, lines) {
          for (var r = fromBox.bottom; r <= toBox.top; r++) {
            var rowLine = lines[r] || '';
            var ch = rowLine.charAt(arrowCol);
            if (ch === ' ' || ch === '' || ch === '\u25BC') continue;
            if (/[\u2500-\u257F]/.test(ch)) continue;
            return false;
          }
          return true;
        }

        // ---------- 抽取：从每个 box 抽出 content（text, align, indent）及框内箭头边 ----------
        function extractBoxContent(box) {
          box._content = [];
          var inBoxEdges = [];
          var children = boxes.filter(function (b) { return b.parent === box; })
            .sort(function (a, b) { return a.top - b.top; });
          var lastChildForArrow = null;
          var y = box.top + 1;
          while (y < box.bottom) {
            var childList = boxTopMap[y] || [];
            var child = null;
            for (var ci = 0; ci < childList.length; ci++) {
              if (childList[ci].parent === box) { child = childList[ci]; break; }
            }
            if (child) {
              lastChildForArrow = child;
              y = child.bottom + 1;
              continue;
            }
            var ln = lines[y];
            var sliceEnd = Math.min(box.right, ln.length);
            var inner = sliceEnd > box.left + 1 ? ln.substring(box.left + 1, sliceEnd) : '';
            var innerForAlign = inner.replace(/\u2502+[\s\u00A0]*$/g, '');
            var innerTrimmed = innerForAlign.trim();
            if (/^\s*\u25BC\s*$/.test(innerTrimmed) && lastChildForArrow) {
              var arrowCol = ln.indexOf('\u25BC');
              var nextChild = null;
              for (var ci2 = 0; ci2 < children.length; ci2++) {
                var c2 = children[ci2];
                if (c2.top > y && c2.left < arrowCol && c2.right > arrowCol) { nextChild = c2; break; }
              }
              if (nextChild && lastChildForArrow.left < arrowCol && lastChildForArrow.right > arrowCol) {
                var edge = { from: lastChildForArrow.id, to: nextChild.id, direction: 'down' };
                var labelLine = y > 0 ? (lines[y - 1] || '') : '';
                var label = labelLine.replace(/\u2502+[\s\u00A0]*$/g, '').replace(/^[\s\u00A0]*\u2502?[\s\u00A0]*/g, '').replace(/(^|\s)\u2502+(\s|$)/g, ' ').replace(/[\s\u00A0]+$/g, '').trim();
                if (/[\u2500-\u257F]/.test(label)) label = label.replace(/[\u2500-\u257F]+/g, '').trim();
                if (label) edge.label = label;
                inBoxEdges.push(edge);
                y++;
                continue;
              }
            }
            var align = getAlign(innerForAlign);
            var leadingSpaces = (innerForAlign.match(/^\s*/) || [''])[0].length;
            var rest = innerForAlign.slice(leadingSpaces).replace(/[\s\u00A0]+$/g, '');
            rest = rest.replace(/(^|\s)\u2502+(\s|$)/g, ' ').replace(/[\s\u00A0]+$/g, '');
            if (/^[\u2500-\u257F]+$/.test(rest)) rest = '';
            // 本行若含框线字符（│ 等）且清洗后无文字，则是结构行；用整行判断（避免 box.right 截断后漏掉中间的 │）
            var fullInner = ln.substring(box.left + 1, ln.length).replace(/\u2502+[\s\u00A0]*$/g, '');
            if (!rest && /[\u2500-\u257F]/.test(fullInner)) { y++; continue; }
            // 不保留空行，间距由渲染时 padding/margin 控制（见 diagram_extraction_model）
            if (!rest) { y++; continue; }
            // 若当前行在「上一个子 box 下方、下一个子 box/箭头之前」，归到该子 box 的 attachedContent（如 DataService 下方的 ├─▶ 树）
            if (lastChildForArrow && lastChildForArrow._attachedContent) {
              lastChildForArrow._attachedContent.push({ text: rest, align: align, indent: leadingSpaces });
            } else {
              if (box._content.length === 0 && leadingSpaces >= 4 && !/^-/.test(rest)) align = 'center';
              box._content.push({ text: rest, align: align, indent: leadingSpaces });
            }
            y++;

    // ---------- 框图布局与静态 HTML 渲染 ----------
    // 根据抽取结果计算每个节点的 (x,y,w,h)，再交给 toDiagramHtml 生成 div+SVG
    function layoutDrawContent(extracted) {
      var nodes = extracted.nodes || [];

      var byId = {};
      nodes.forEach(function (n) { byId[n.id] = n; });
      var parent = {};
      nodes.forEach(function (n) {
        (n.children || []).forEach(function (cid) { parent[cid] = n.id; });
      });
      var roots = nodes.filter(function (n) { return !parent[n.id]; });
      var depth = {};
      function getDepth(id) {
        if (depth[id] != null) return depth[id];

        depth[id] = p == null ? 0 : 1 + getDepth(p);

        row.forEach(function (id) { if (nodeH[id] > maxH) maxH = nodeH[id]; });
        y += maxH + gapY;

      var nodeToRowCol = {};
      rows.forEach(function (row, ri) {
        row.forEach(function (id, ci) { nodeToRowCol[id] = { row: ri, col: ci }; });

      var layout = {};
      var maxX = 0, maxY = 0;
      order.forEach(function (id) {
        var rc = nodeToRowCol[id] || { row: 0, col: 0 };

      function expandParentToContainer(nid) {

    // 方案2：用 div + 箭头 DIV 生成静态 HTML（可复制到 CKEditor 直接显示）
    function toDiagramHtml(extracted, layoutResult) {

          for (var i = 1; i < contentOnly.length; i++) {

          }

          contentOnly.forEach(function (line) {
            var indentSpaces = new Array(normIndent(line) + 1).join(' ');
            var isLi = /^-/.test(line.text);
            var cleanText = isLi ? line.text.replace(/^-\s*/, '') : line.text;
            var bullet = isLi ? '• ' : '';

              distance = toRect.top - fromRect.bottom;
            } else {
              // 没有目标 box 时的兜底：指向连接区域中点
              distance = (connRect.top - fromRect.bottom) + connRect.height / 2;
            }
          } else if (toRect) {
            // 没有 connector：从 fromBox 底部到下一个 box 顶部的距离
            distance = toRect.top - fromRect.bottom;
          } else {
            return;
          }
          if (distance <= 0) return;

          // 把算出来的总高度写在 wrapper 上，线段高度交给 CSS（height: calc(100% - 10px)）
          arrow.style.height = distance + 'px';
        });
      });
    }

    function convert() {
      var raw = mdEl.value.trim();
      if (!raw) { htmlEl.value = ''; return; }
      var html = marked.parse(raw);
      html = tablesToDocDiagramDiv(html);
      html = asciiBlockToPreWithBoxDivs(html);
      htmlEl.value = html;
      if (previewEl) {
        previewEl.innerHTML = html;
        // 等浏览器完成布局后再计算箭头高度
        setTimeout(function () {
          adjustDiagramArrows(previewEl);
        }, 0);
      }
    }

    convertBtn.addEventListener('click', convert);

    copyBtn.addEventListener('click', function () {
      htmlEl.select();
      document.execCommand('copy');
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(function () { copyBtn.textContent = '复制 HTML'; copyBtn.classList.remove('copied'); }, 1500);
    });
  </script>
</body>
</html>
