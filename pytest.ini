[pytest]
# 项目根目录加入 sys.path，无需每次写 PYTHONPATH=.
pythonpath = .
# 只从 core 下收集测试（各模块的 __test__/test_*.py）
testpaths = core
# 排除历史/备份目录，避免收集到已废弃接口对应的旧测试
norecursedirs =
    *.git
    *.venv
    venv
    core/modules/*_backup
# 第三方依赖在解释器退出时的弃用提示（不影响本仓库逻辑）
filterwarnings =
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
    ignore:.*urllib3 v2 only supports OpenSSL 1.1.1\+.*
